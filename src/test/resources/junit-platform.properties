# without this flag parallel run won't be possible no matter what annotations are used
junit.jupiter.execution.parallel.enabled=true

# flag that define mode of tests execution (in one thread or parallel)
# possible values: same_thread or concurrent (=multithread)
# more specific flag that checks annotations
# e.g. same_thread -> all the test that are not marked with @Execution will run in the same thread (by default)
# e.g. concurrent -> all tests will be run in different thread no matter with which annotations the tests are marked
junit.jupiter.execution.parallel.mode.default=concurrent

# flag that defines strategy of treads
# possible values: dynamic or fixed
# e.g. dynamic -> amount of thread are defines automatically (by CPU)
# e.g. fixed -> amount of thread is defined manually
junit.jupiter.execution.parallel.config.strategy=fixed

# flag that define amount of parallel threads
# this parameter is ignored if "dynamic" flag is used
junit.jupiter.execution.parallel.config.fixed.parallelism=2
